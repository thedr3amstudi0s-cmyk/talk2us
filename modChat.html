<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Mod Chat</h1>
  <div id="messages" class="messages"></div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">
import { db, sendMessage, listenMessages, markGuestActive } from './firebase.js';

const params = new URLSearchParams(window.location.search);
const guestId = params.get('guest');

const messagesDiv = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

markGuestActive(guestId);
listenMessages(guestId, displayMessage);

sendBtn.onclick = () => {
  const text = msgInput.value.trim();
  if (!text) return;
  sendMessage(guestId, 'mod', text);
  msgInput.value = '';
};

function displayMessage(msg) {
  const div = document.createElement('div');
  div.classList.add('message');
  div.classList.add(msg.sender==='guest'?'guest-msg':'mod-msg');
  div.textContent = msg.text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
</script>
</body>
</html>
