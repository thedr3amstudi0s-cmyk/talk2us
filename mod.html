<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moderator Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Moderator Panel</h1>
<div id="guestList"></div>

<script type="module">
import { db, ref, onValue } from './firebase.js';

const guestListDiv = document.getElementById('guestList');

onValue(ref(db, 'requests'), snapshot => {
  guestListDiv.innerHTML = '';
  snapshot.forEach(snap => {
    const guest = snap.val();
    const div = document.createElement('div');
    div.textContent = guest.guestId;
    if (guest.active) div.classList.add('active');
    div.onclick = () => {
      window.open('modChat.html?guest=' + guest.guestId, '_blank');
    };
    guestListDiv.appendChild(div);
  });
});
</script>
</body>
</html>
